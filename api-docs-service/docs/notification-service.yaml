openapi: 3.0.3
info:
  title: Notification Service
  version: 1.0.0
  description: |
    Real-time and stored notification delivery.
    Listens to Redis pub/sub events from other services
    and delivers notifications to users via REST polling
    and WebSocket push.

servers:
  - url: http://localhost:8081
    description: API Gateway (production)

tags:
  - name: Notifications
    description: Notification polling and management
  - name: Realtime
    description: WebSocket real-time notifications

paths:
  /notifications:
    get:
      tags: [Notifications]
      summary: Get notifications
      description: Retrieves all notifications for a user.
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: User UUID
      responses:
        "200":
          description: Notifications retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user_id:
                    type: string
                    format: uuid
                  total:
                    type: integer
                    example: 5
                  unread_count:
                    type: integer
                    example: 2
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
                  message:
                    type: string
                    example: Notifications fetched successfully

  /notifications/count:
    get:
      tags: [Notifications]
      summary: Get unread count
      description: Returns the count of unread notifications for a user.
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: User UUID
      responses:
        "200":
          description: Unread count retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user_id:
                    type: string
                    format: uuid
                  unread_count:
                    type: integer
                    example: 2
                  message:
                    type: string
                    example: Unread notification count fetched successfully

  /notifications/mark-read:
    post:
      tags: [Notifications]
      summary: Mark notification as read
      description: Marks a single notification as read.
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: User UUID
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Notification UUID to mark as read
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user_id:
                    type: string
                    format: uuid
                  notification_id:
                    type: string
                    format: uuid
                  unread_count:
                    type: integer
                    example: 1
                  message:
                    type: string
                    example: Notification marked as read

  /ws:
    get:
      tags: [Realtime]
      summary: WebSocket real-time notifications
      description: |
        Upgrades to a WebSocket connection for real-time push notifications.
        - Authenticate via JWT in the `Authorization` header during handshake.
        - On connect, all existing notifications are sent.
        - New notifications are pushed in real-time as they arrive.
        - Keepalive pings are sent every 60 seconds.
      security:
        - bearerAuth: []
      responses:
        "101":
          description: Switching Protocols — WebSocket connection established
        "401":
          description: Unauthorized — invalid or missing JWT

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
          example: Login Successful
        message:
          type: string
          example: jane@example.com logged in
        source_service:
          type: string
          example: auth-service
        action:
          type: string
          nullable: true
          example: USER_LOGIN
        meta:
          type: object
          nullable: true
          description: Optional extra payload
        read:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time

security:
  - bearerAuth: []
