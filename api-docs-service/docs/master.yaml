openapi: 3.0.3

info:
  title: My Platform API
  version: 1.0.0

# 🚪 API Gateway (ONLY entry point)
servers:
  - url: http://localhost:8081

tags:
  - name: Auth
    description: Authentication and user account management
  - name: Mood
    description: Mood tracking service
  - name: Blog
    description: Blog posts service
  - name: Notifications
    description: Notification service

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

# 🔐 Default: all endpoints require JWT unless overridden
security:
  - bearerAuth: []

paths:

  ####################################################
  # HEALTH
  ####################################################
  /healthz:
    get:
      tags: [Auth]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  ####################################################
  # AUTH SERVICE
  ####################################################
  /auth/email/signup:
    post:
      tags: [Auth]
      summary: Signup with email & password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: Suzz Doe }
                email: { type: string, example: suzzcreative@example.com }
                password: { type: string, example: StrongPassword123 }
      responses:
        "201":
          description: Signup initiated

  /auth/email/verify:
    get:
      tags: [Auth]
      summary: Verify email
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Email verified

  /auth/email/login:
    post:
      tags: [Auth]
      summary: Login with email & password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }
                  expires_in: { type: integer }

  /auth/google/login:
    get:
      tags: [Auth]
      summary: Google OAuth login
      security: []
      responses:
        "302":
          description: Redirect to Google

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Google login success

  ####################################################
  # USER PROFILE (JWT REQUIRED)
  ####################################################
  /user/profile:
    get:
      tags: [Auth]
      summary: Get my profile
      responses:
        "200":
          description: User profile returned

    put:
      tags: [Auth]
      summary: Update my profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bio: { type: string }
                custom_avatar_url: { type: string }
      responses:
        "200":
          description: Profile updated

  ####################################################
  # MOOD SERVICE
  ####################################################
  /api/v1/moods:
    post:
      tags: [Mood]
      summary: Create or update today's mood
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mood: { type: string }
                mood_score: { type: integer }
                note: { type: string }
      responses:
        "200":
          description: Mood saved

    get:
      tags: [Mood]
      summary: Get my moods
      responses:
        "200":
          description: Mood list returned

  /api/v1/moods/analytics:
    get:
      tags: [Mood]
      summary: Mood analytics
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [week, month]
      responses:
        "200":
          description: Analytics returned

  ####################################################
  # BLOG SERVICE
  ####################################################
  /blog:
    get:
      tags: [Blog]
      summary: List blog posts
      responses:
        "200": { description: OK }

    post:
      tags: [Blog]
      summary: Create blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                content: { type: string }
      responses:
        "201": { description: Created }

  /blog/{id}:
    get:
      tags: [Blog]
      summary: Get blog post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

    put:
      tags: [Blog]
      summary: Update blog post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Updated }

    delete:
      tags: [Blog]
      summary: Delete blog post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Deleted }

  ####################################################
  # NOTIFICATIONS
  ####################################################
  /notifications:
    get:
      tags: [Notifications]
      summary: Get notifications
      responses:
        "200": { description: OK }

  /notifications/mark-read:
    post:
      tags: [Notifications]
      summary: Mark notifications as read
      responses:
        "200": { description: Updated }
