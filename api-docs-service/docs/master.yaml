openapi: 3.0.3
info:
  title: My Platform API
  version: 1.0.0

servers:
  - url: http://localhost:8085

tags:
  - name: Auth
    description: Authentication and user account management
  - name: Mood
    description: Mood tracking service
  - name: Blog
    description: Blog posts service
  - name: Notifications
    description: Notification service

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

# Apply security globally (all endpoints require bearer token unless overridden)
security:
  - bearerAuth: []

paths:

  # Health check (no auth)
  /healthz:
    get:
      tags: [Auth]
      summary: Health check endpoint
      servers:
        - url: http://localhost:8081
      security: []  # override global auth, open endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  # Email Signup (no auth)
  /auth/email/signup:
    post:
      tags: [Auth]
      summary: Signup with email and password (sends verification email)
      servers:
        - url: http://localhost:8081
      security: []  # override global auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: suzz Doe }
                email: { type: string, example: suzzcreative@example.com }
                password: { type: string, example: SuzzPassword123 }
      responses:
        "201":
          description: Signup initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Check your email to confirm signup. Link valid for 15 minutes.

  # Email Verify (no auth)
  /auth/email/verify:
    get:
      tags: [Auth]
      summary: Verify email using token
      servers:
        - url: http://localhost:8081
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Verification token sent to email
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  user_id: { type: string }

  # Email Login (no auth)
  /auth/email/login:
    post:
      tags: [Auth]
      summary: Login using email and password
      servers:
        - url: http://localhost:8081
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: suzzcreative@example.com }
                password: { type: string, example: StrongPassword123 }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }
                  expires_in: { type: integer, example: 3600 }
                  user:
                    type: object
                    properties:
                      user_id: { type: string }
                      email: { type: string }
                      name: { type: string }
                      provider: { type: string }
                      role: { type: string }

  # Google OAuth (no auth)
  /auth/google/login:
    get:
      tags: [Auth]
      summary: Redirect to Google login
      servers:
        - url: http://localhost:8081
      security: []
      responses:
        "302":
          description: Redirect to Google consent screen

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback
      servers:
        - url: http://localhost:8081
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Login successful via Google
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }
                  expires_in: { type: integer }
                  user:
                    type: object
                    properties:
                      user_id: { type: string }
                      email: { type: string }
                      name: { type: string }
                      avatar: { type: string }
                      provider: { type: string }
                      role: { type: string }

  # ==============================
  # User Profile (Protected)
  # ==============================
   # ==============================
  # User Profile (Protected)
  # ==============================
  /user/profile:
    get:
      tags: [Auth]
      summary: Get authenticated user's profile
      servers:
        - url: http://localhost:8081
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: query
          required: true
          description: JWT access token (for Swagger UI input)
          schema:
            type: string
      responses:
        "200":
          description: Returns user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string }
                  bio: { type: string, nullable: true }
                  custom_avatar_url: { type: string, nullable: true }
                  created_at: { type: string }
                  updated_at: { type: string }
    
    put:
      tags: [Auth]
      summary: Update authenticated user's profile
      servers:
        - url: http://localhost:8081
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: query
          required: true
          description: JWT access token (for Swagger UI input)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bio: { type: string, example: "I am a Go developer" }
                custom_avatar_url: { type: string, example: "https://example.com/avatar.png" }
      responses:
        "200":
          description: Updated profile returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string }
                  bio: { type: string, nullable: true }
                  custom_avatar_url: { type: string, nullable: true }
                  created_at: { type: string }
                  updated_at: { type: string }

  paths:
  ####################################################
  # MOOD SERVICE (PORT 8082)
  ####################################################
  /api/v1/moods:
    post:
      tags: [Mood]
      summary: Create or update today's mood
      servers:
        - url: http://localhost:8082
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mood:
                  type: string
                  example: "very good"
                mood_score:
                  type: integer
                  example: 10
                note:
                  type: string
                  example: "Had a productive day"
      responses:
        "200":
          description: Mood saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  mood_id: { type: string, example: "123e4567-e89b-12d3-a456-426614174000" }
                  message: { type: string, example: "Mood saved successfully (updated if already exists for today)" }

    get:
      tags: [Mood]
      summary: Get all moods for authenticated user
      servers:
        - url: http://localhost:8082
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of moods returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  moods:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, example: "123e4567-e89b-12d3-a456-426614174000" }
                        mood: { type: string, example: "very good" }
                        mood_score: { type: integer, example: 10 }
                        note: { type: string, example: "Had a productive day" }
                        created_at: { type: string, format: date-time, example: "2025-11-25T12:34:56Z" }

  /api/v1/moods/analytics:
    get:
      tags: [Mood]
      summary: Get mood analytics (weekly, monthly, or custom range)
      servers:
        - url: http://localhost:8082
      security:
        - bearerAuth: []
      parameters:
        - name: range
          in: query
          required: false
          description: "Analytics range (week or month)"
          schema:
            type: string
            enum: [week, month]
        - name: from
          in: query
          required: false
          description: "Start date (YYYY-MM-DD)"
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: "End date (YYYY-MM-DD)"
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Analytics returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  from: { type: string, example: "2025-11-01" }
                  to: { type: string, example: "2025-11-07" }
                  avg_score: { type: number, example: 3.5 }
                  total_entries: { type: integer, example: 7 }
                  counts_by_mood:
                    type: array
                    items:
                      type: object
                      properties:
                        mood: { type: string, example: "very good" }
                        count: { type: integer, example: 10 }
                  time_series:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string, format: date, example: "2025-11-01" }
                        avg_score: { type: number, example: 4.0 }
                        count: { type: integer, example: 1 }

  ####################################################
  # BLOG SERVICE
  ####################################################
  /blog:
    get:
      tags: [Blog]
      summary: List blog posts
      responses:
        "200": { description: List of posts }

    post:
      tags: [Blog]
      summary: Create blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                content: { type: string }
      responses:
        "201": { description: Post created }

  /blog/{id}:
    get:
      tags: [Blog]
      summary: Get blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Post retrieved }

    put:
      tags: [Blog]
      summary: Update blog post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                content: { type: string }
      responses:
        "200": { description: Post updated }

    delete:
      tags: [Blog]
      summary: Delete blog post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Post deleted }

  ####################################################
  # NOTIFICATION SERVICE
  ####################################################
  /notifications:
    get:
      tags: [Notifications]
      summary: Get user notifications
      security:
        - bearerAuth: []
      responses:
        "200": { description: Notifications returned }

  /notifications/mark-read:
    post:
      tags: [Notifications]
      summary: Mark notifications as read
      security:
        - bearerAuth: []
      responses:
        "200": { description: Notifications marked as read }
