version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend_net

  hasura:
    image: hasura/graphql-engine:v2.37.0
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET}
      HASURA_GRAPHQL_ENABLED_SCHEMAS: auth_service,mood_service,notification_service
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup,http-log,webhook-log,websocket-log,query-log
    volumes:
      - ./hasura:/hasura-metadata
    networks:
      - backend_net

  pgadmin:
    image: dpage/pgadmin4:7
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - backend_net

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - backend_net

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      - hasura
      - postgres
      - redis
    networks:
      - backend_net

  mood-service:
    build:
      context: ./mood-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8082:8082"
    depends_on:
      - hasura
      - postgres
      - auth-service
      - redis
    networks:
      - backend_net

  blog-service:
    build:
      context: ./blog-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8083:8083"
    depends_on:
      - hasura
      - postgres
      - auth-service
      - redis
    networks:
      - backend_net

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8084:8084"
    depends_on:
      - redis
      - hasura
      - auth-service
      - postgres
    restart: always
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /keys/firebase-service-account.json
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      ENABLE_PUSH: ${ENABLE_PUSH}
      ENABLE_EMAIL: ${ENABLE_EMAIL}
    volumes:
      - ./notification-service/keys:/keys:ro
    networks:
      - backend_net

  api-docs-service:
    build:
      context: ./api-docs-service
    ports:
      - "8085:8085"
    volumes:
      - ./api-docs-service/docs:/root/docs:ro  # Mount your docs folder
    networks:
      - backend_net


volumes:
  pgdata:

networks:
  backend_net:
    driver: bridge
